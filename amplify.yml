version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd $CODEBUILD_SRC_DIR/pantrypal-app && npm install
        build:
          commands:
            - cd $CODEBUILD_SRC_DIR/pantrypal-app && npm run build --workspace=apps/web
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    appRoot: apps/web