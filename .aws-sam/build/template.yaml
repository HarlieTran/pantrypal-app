AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: PantryPal Daily Special prewarm scheduler (Lambda + EventBridge)
Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
  AwsRegion:
    Type: String
    Default: us-east-2
  BedrockRegion:
    Type: String
    Default: us-east-1
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-5-sonnet-20240620-v1:0
  DailySpecialsBucket:
    Type: String
  UnsplashAccessKey:
    Type: String
    Default: ''
    NoEcho: true
  DefaultDishImageUrl:
    Type: String
    Default: ''
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 90
    MemorySize: 1024
    Architectures:
    - x86_64
    Environment:
      Variables:
        DATABASE_URL:
          Ref: DatabaseUrl
        AWS_REGION:
          Ref: AwsRegion
        BEDROCK_REGION:
          Ref: BedrockRegion
        BEDROCK_MODEL_ID:
          Ref: BedrockModelId
        S3_BUCKET_DAILY_SPECIALS:
          Ref: DailySpecialsBucket
        UNSPLASH_ACCESS_KEY:
          Ref: UnsplashAccessKey
        DEFAULT_DISH_IMAGE_URL:
          Ref: DefaultDishImageUrl
Resources:
  DailySpecialPrewarmFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: DailySpecialPrewarmFunction
      Handler: daily-special-prewarm.lambda.handler
      Events:
        DailyAt0005Utc:
          Type: Schedule
          Properties:
            Schedule: cron(5 0 * * ? *)
            Description: Generate and persist daily special at 00:05 UTC
            Enabled: true
      Policies:
      - AWSLambdaBasicExecutionRole
      - Statement:
          Effect: Allow
          Action:
          - bedrock:InvokeModel
          - bedrock:Converse
          Resource: '*'
      - Statement:
          Effect: Allow
          Action:
          - s3:PutObject
          - s3:GetObject
          Resource:
            Fn::Sub: arn:aws:s3:::${DailySpecialsBucket}/daily-specials/*
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - src/jobs/daily-special-prewarm.lambda.ts
        Format: esm
        Minify: true
        Sourcemap: false
        Target: es2022
      SamResourceId: DailySpecialPrewarmFunction
Outputs:
  DailySpecialPrewarmFunctionArn:
    Description: ARN of the scheduled Daily Special prewarm Lambda
    Value:
      Fn::GetAtt:
      - DailySpecialPrewarmFunction
      - Arn
