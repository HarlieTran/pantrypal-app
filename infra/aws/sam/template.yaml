AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: PantryPal API (Signup/Login v1) on Lambda + API Gateway HTTP API

Parameters:
  FrontendOrigin:
    Type: String
    Default: "http://localhost:5173"
  DatabaseUrl:
    Type: String
    NoEcho: true
  CognitoRegion:
    Type: String
  CognitoUserPoolId:
    Type: String
  CognitoAppClientId:
    Type: String

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 512
    Architectures:
      - x86_64
    Environment:
      Variables:
        FRONTEND_ORIGIN: !Ref FrontendOrigin
        DATABASE_URL: !Ref DatabaseUrl
        COGNITO_REGION: !Ref CognitoRegion
        COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
        COGNITO_APP_CLIENT_ID: !Ref CognitoAppClientId

Resources:
  PantryPalHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowMethods:
          - GET
          - POST
          - PATCH
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowOrigins:
          - !Ref FrontendOrigin

  PantryPalApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../../apps/api
      Handler: src/lambda.handler
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref PantryPalHttpApi
            Method: GET
            Path: /health
        Bootstrap:
          Type: HttpApi
          Properties:
            ApiId: !Ref PantryPalHttpApi
            Method: POST
            Path: /me/bootstrap
      Policies:
        - AWSLambdaBasicExecutionRole
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Format: esm
        EntryPoints:
          - src/lambda.ts
        Sourcemap: false

Outputs:
  ApiBaseUrl:
    Description: Base URL for Amplify frontend (set as VITE_API_BASE_URL)
    Value: !Sub "https://${PantryPalHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
