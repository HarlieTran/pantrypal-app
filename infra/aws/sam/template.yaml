AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: PantryPal API (Signup/Login v1) on Lambda + API Gateway HTTP API

Parameters:
  FrontendOrigin:
    Type: String
    Default: "http://localhost:5173"
  DatabaseUrl:
    Type: String
    NoEcho: true
  CognitoRegion:
    Type: String
  CognitoUserPoolId:
    Type: String
  CognitoAppClientId:
    Type: String
  AwsRegion:
    Type: String
    Default: "us-east-2"
  BedrockRegion:
    Type: String
    Default: "us-east-1"
  BedrockModelId:
    Type: String
    Default: "anthropic.claude-3-5-sonnet-20240620-v1:0"
  DailySpecialsBucket:
    Type: String
  UnsplashAccessKey:
    Type: String
    Default: ""
    NoEcho: true
  DefaultDishImageUrl:
    Type: String
    Default: ""

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 512
    Architectures:
      - x86_64
    Environment:
      Variables:
        FRONTEND_ORIGIN: !Ref FrontendOrigin
        DATABASE_URL: !Ref DatabaseUrl
        COGNITO_REGION: !Ref CognitoRegion
        COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
        COGNITO_APP_CLIENT_ID: !Ref CognitoAppClientId
        AWS_REGION: !Ref AwsRegion
        BEDROCK_REGION: !Ref BedrockRegion
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        S3_BUCKET_DAILY_SPECIALS: !Ref DailySpecialsBucket
        UNSPLASH_ACCESS_KEY: !Ref UnsplashAccessKey
        DEFAULT_DISH_IMAGE_URL: !Ref DefaultDishImageUrl

Resources:
  PantryPalHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowMethods:
          - GET
          - POST
          - PATCH
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowOrigins:
          - !Ref FrontendOrigin

  PantryPalApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../../apps/api
      Handler: src/lambda.handler
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref PantryPalHttpApi
            Method: GET
            Path: /health
        Bootstrap:
          Type: HttpApi
          Properties:
            ApiId: !Ref PantryPalHttpApi
            Method: POST
            Path: /me/bootstrap
      Policies:
        - AWSLambdaBasicExecutionRole
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Format: esm
        EntryPoints:
          - src/lambda.ts
        Sourcemap: false

  DailySpecialPrewarmFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../../apps/api
      Handler: src/jobs/daily-special-prewarm.lambda.handler
      Timeout: 90
      MemorySize: 1024
      Events:
        DailyAt0005Utc:
          Type: Schedule
          Properties:
            Schedule: cron(5 0 * * ? *)
            Description: Generate and persist daily special at 00:05 UTC
            Enabled: true
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:Converse
            Resource: "*"
        - Statement:
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
            Resource: !Sub "arn:aws:s3:::${DailySpecialsBucket}/daily-specials/*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Format: esm
        EntryPoints:
          - src/jobs/daily-special-prewarm.lambda.ts
        Sourcemap: false

  PrewarmJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../../apps/api
      Handler: src/jobs/prewarm.lambda.handler
      Timeout: 30
      Events:
        DailyAt0005Utc:
          Type: Schedule
          Properties:
            Schedule: cron(5 0 * * ? *)
            Description: Prewarm job at 00:05 UTC
            Enabled: true
      Policies:
        - AWSLambdaBasicExecutionRole
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Format: esm
        EntryPoints:
          - src/jobs/prewarm.lambda.ts
        Sourcemap: false

Outputs:
  ApiBaseUrl:
    Description: Base URL for Amplify frontend (set as VITE_API_BASE_URL)
    Value: !Sub "https://${PantryPalHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
